<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울/경기 음성광고 그룹핑 지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root{
    --bg:#0B161E;
    --bg-panel:#101F2A;
    --bg-panel-2:#0D1B24;
    --text-primary:#E7EEF1;
    --text-secondary:#9FB4C0;
    --text-muted:#5E7886;
    --accent:#FF7A3D;
    --accent-soft:#FF7A3D25;
    --accent-stroke:#FFB088;
    --ok:#48D6A8;
    --ok-soft:#48D6A818;
    --short:#F2B33D;
    --short-soft:#F2B33D18;
    --border:#1B2F3C;
    --map-idle:#16293590;
    --map-idle-stroke:#2B4456;
    --map-dim:#0e1d25;
    --map-dim-stroke:#162432;
    --seoul-tag:#4A90E2;
    --gyeonggi-tag:#E86A3A;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text-primary);font-family:var(--sans);min-height:100vh;}

  .app{max-width:1300px;margin:0 auto;padding:20px 20px 40px;}

  /* header */
  header.top{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.13em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
  h1{font-size:24px;font-weight:700;margin:0;letter-spacing:-0.01em;}
  h1 .dot{color:var(--accent);}
  .stat-row{display:flex;gap:20px;font-family:var(--mono);}
  .stat .num{font-size:19px;font-weight:600;line-height:1.1;}
  .stat .lbl{font-size:10px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}

  /* layout */
  .layout{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start;}
  @media(max-width:860px){.layout{grid-template-columns:1fr;}}

  /* panel */
  .panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .panel-head{padding:12px 15px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
  .panel-head .title{font-size:11.5px;letter-spacing:0.06em;color:var(--text-secondary);text-transform:uppercase;font-family:var(--mono);}

  /* region tabs */
  .rgn-tabs{display:flex;gap:6px;}
  .rgn-btn{font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);border-radius:6px;padding:4px 9px;cursor:pointer;transition:all .15s;}
  .rgn-btn:hover{border-color:var(--accent-stroke);color:var(--text-primary);}
  .rgn-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .rgn-btn[data-region="서울"].active{border-color:var(--seoul-tag);color:var(--seoul-tag);background:#4A90E218;}
  .rgn-btn[data-region="경기"].active{border-color:var(--gyeonggi-tag);color:var(--gyeonggi-tag);background:#E86A3A18;}

  .toggle-all{font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);border-radius:6px;padding:5px 9px;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .toggle-all:hover{border-color:var(--accent-stroke);color:var(--text-primary);}
  .toggle-all.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

  .group-list{max-height:500px;overflow-y:auto;}
  .group-list::-webkit-scrollbar{width:6px;}
  .group-list::-webkit-scrollbar-thumb{background:#1d3140;border-radius:3px;}

  .group-item{width:100%;display:flex;align-items:center;gap:8px;text-align:left;background:transparent;border:none;border-bottom:1px solid var(--border);border-left:3px solid transparent;color:var(--text-primary);padding:9px 13px;cursor:pointer;font-family:var(--sans);transition:background .15s,border-color .15s;}
  .group-item:last-child{border-bottom:none;}
  .group-item:hover{background:#0F2029;}
  .group-item.active{background:var(--accent-soft);border-left-color:var(--accent);}
  .gswatch{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .gid{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--text-muted);width:34px;flex-shrink:0;}
  .group-item.active .gid{color:var(--accent);}
  .glabel{flex:1;font-size:12.5px;line-height:1.3;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .gmeta{text-align:right;flex-shrink:0;}
  .gamount{font-family:var(--mono);font-size:12px;font-weight:600;}
  .gdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:5px;}
  .gdot.ok{background:var(--ok);}
  .gdot.short{background:var(--short);}

  /* region tags */
  .rtag{font-size:10px;font-family:var(--mono);font-weight:600;padding:2px 5px;border-radius:4px;letter-spacing:0.04em;}
  .rtag.seoul{background:#4A90E222;color:var(--seoul-tag);border:1px solid #4A90E240;}
  .rtag.gyeonggi{background:#E86A3A22;color:var(--gyeonggi-tag);border:1px solid #E86A3A40;}

  /* detail */
  .detail{padding:15px;}
  .detail .dh{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
  .detail .dh .id{font-family:var(--mono);color:var(--accent);font-size:13px;font-weight:700;}
  .detail .dh .label{font-size:14px;font-weight:600;}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
  .chip{font-family:var(--mono);font-size:11px;background:var(--bg-panel-2);border:1px solid var(--border);border-radius:5px;padding:3px 7px;color:var(--text-secondary);}
  .chip b{color:var(--text-primary);font-weight:600;}
  .chip.overlap{border-color:#7B9EBB55;background:#7B9EBB0D;}
  .otag{font-size:9px;margin-left:4px;padding:1px 4px;border-radius:3px;background:#7B9EBB22;color:#7B9EBB;vertical-align:middle;}
  .totals{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;padding-top:10px;border-top:1px dashed var(--border);}
  .totals .row{display:flex;flex-direction:column;gap:2px;}
  .totals .row .v{font-size:14px;font-weight:700;}
  .totals .row .v.total{color:var(--text-primary);}
  .totals .row.ok .v{color:var(--ok);}
  .totals .row.short .v{color:var(--short);}
  .note{margin-top:9px;font-size:11.5px;color:var(--short);background:var(--short-soft);border:1px solid #f2b33d35;border-radius:6px;padding:7px 10px;line-height:1.5;}

  /* map */
  .map-panel{position:relative;min-height:520px;display:flex;flex-direction:column;}
  .map-wrap{position:relative;flex:1;}
  svg#map{width:100%;height:100%;display:block;}
  .district{fill:var(--map-idle);stroke:var(--map-idle-stroke);stroke-width:0.8;transition:fill .3s,stroke .3s,opacity .3s;cursor:pointer;}
  .district.dim{fill:var(--map-dim);stroke:var(--map-dim-stroke);}
  .district.hl{stroke-width:1.4;}
  .bbox-rect{fill:none;stroke:var(--accent-stroke);stroke-width:1.2;stroke-dasharray:6 5;pointer-events:none;opacity:0;transition:opacity .25s;}
  .bbox-rect.show{opacity:.9;animation:dashmove 18s linear infinite;}
  @keyframes dashmove{to{stroke-dashoffset:-400;}}
  .tick{stroke:var(--accent);stroke-width:1.6;fill:none;pointer-events:none;opacity:0;transition:opacity .2s;}
  .tick.show{opacity:1;}
  .tooltip{position:absolute;pointer-events:none;background:#08131A;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;line-height:1.5;color:var(--text-primary);transform:translate(-50%,-115%);opacity:0;transition:opacity .1s;z-index:5;white-space:nowrap;}
  .tooltip b{color:var(--accent);}
  .tooltip.show{opacity:1;}
  .ttmeta{font-family:var(--mono);color:var(--text-secondary);}
  .legend{display:flex;gap:14px;align-items:center;padding:9px 15px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);flex-wrap:wrap;}
  .legend .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:middle;}

  footer.foot{margin-top:20px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--text-muted);letter-spacing:0.05em;}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <div class="eyebrow">SEOUL &amp; GYEONGGI-DO · VOICE-AD COST GROUPING</div>
      <h1>서울/경기 음성광고비 그룹핑<span class="dot">.</span></h1>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="num">72</div><div class="lbl">행정구</div></div>
      <div class="stat"><div class="num">28</div><div class="lbl">그룹</div></div>
      <div class="stat"><div class="num">25</div><div class="lbl">300만원 달성</div></div>
      <div class="stat"><div class="num">28</div><div class="lbl">전 그룹 달성</div></div>
    </div>
  </header>

  <div class="layout">
    <div>
      <div class="panel">
        <div class="panel-head">
          <div class="title">그룹 선택</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <div class="rgn-tabs">
              <button class="rgn-btn active" data-region="all" type="button">전체</button>
              <button class="rgn-btn" data-region="서울" type="button">서울</button>
              <button class="rgn-btn" data-region="경기" type="button">경기</button>
            </div>
            <button class="toggle-all" id="toggleAll" type="button">전체 보기</button>
          </div>
        </div>
        <div class="group-list" id="groupList"></div>
      </div>
      <div class="panel detail" id="detailPanel"></div>
    </div>

    <div class="panel map-panel">
      <div class="panel-head">
        <div class="title">행정구역 지도</div>
        <div style="font-size:11px;color:var(--text-muted);">행정구역 클릭시 해당 그룹으로 이동</div>
      </div>
      <div class="map-wrap" id="mapWrap">
        <svg id="map" viewBox="0 0 760 680" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="tooltip" id="tooltip"></div>
      </div>
      <div class="legend">
        <span><span class="sw" style="background:#4A90E2;"></span>서울 그룹</span>
        <span><span class="sw" style="background:#E86A3A;"></span>경기 그룹</span>
        <span><span class="sw" style="background:var(--ok);border-radius:50%;"></span>300만원 달성</span>
        <span><span class="sw" style="background:var(--short);border-radius:50%;"></span>300만원 미달</span>
      </div>
    </div>
  </div>

  <footer class="foot">행정구역 경계: 통계청 행정동(2026.04) · 화성시 4개 일반구 2026.02 신설 반영 · 서울 25개 자치구 + 경기 47개 행정구</footer>
</div>

"region":"경기","members":[{"name":"용인시 기흥구","amount":2000000},{"name":"용인시 수지구","amount":1000000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG3","label":"용인(처인구)-이천","region":"경기","members":[{"name":"용인시 처인구","amount":2000000},{"name":"이천시","amount":1000000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG4","label":"하남-광주","region":"경기","members":[{"name":"하남시","amount":1500000},{"name":"광주시","amount":1500000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG5","label":"수원시(영통구+권선구)","region":"경기","members":[{"name":"수원시 영통구","amount":1500000},{"name":"수원시 권선구","amount":1500000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG6","label":"수원(팔달+장안)-오산","region":"경기","members":[{"name":"수원시 팔달구","amount":1000000},{"name":"수원시 장안구","amount":1000000},{"name":"오산시","amount":1000000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG7","label":"화성(동탄+만세+효행)","region":"경기","members":[{"name":"화성시 동탄구","amount":1500000},{"name":"화성시 만세구","amount":1000000},{"name":"화성시 효행구","amount":500000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG8","label":"화성(병점)-평택-안성","region":"경기","members":[{"name":"화성시 병점구","amount":500000},{"name":"평택시","amount":1500000},{"name":"안성시","amount":1000000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG9","label":"안양생활권","region":"경기","members":[{"name":"안양시 동안구","amount":1000000},{"name":"안양시 만안구","amount":500000},{"name":"군포시","amount":500000},{"name":"의왕시","amount":500000},{"name":"과천시","amount":500000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG10","label":"시흥-안산(단원구)","region":"경기","members":[{"name":"시흥시","amount":1500000},{"name":"안산시 단원구","amount":1500000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG11","label":"김포-광명-안산(상록구)","region":"경기","members":[{"name":"김포시","amount":1500000},{"name":"광명시","amount":1000000},{"name":"안산시 상록구","amount":500000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG12","label":"고양시(덕양구+일산서구)","region":"경기","members":[{"name":"고양시 덕양구","amount":2000000},{"name":"고양시 일산서구","amount":1000000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG13","label":"파주-양주","region":"경기","members":[{"name":"파주시","amount":2000000},{"name":"양주시","amount":1000000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG14","label":"고양(일산동구)-의정부-구리","region":"경기","members":[{"name":"고양시 일산동구","amount":1500000},{"name":"의정부시","amount":1000000},{"name":"구리시","amount":500000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG15","label":"남양주-포천","region":"경기","members":[{"name":"남양주시","amount":2000000},{"name":"포천시","amount":1000000}],"total":3000000,"diff":0,"status":"ok"},{"id":"GG16","label":"성남(중원)-이천-여주-가평-양평","region":"경기","members":[{"name":"성남시 중원구","amount":1000000},{"name":"여주시","amount":500000},{"name":"가평군","amount":500000},{"name":"양평군","amount":500000},{"name":"이천시","amount":1000000,"overlap":true}],"total":3500000,"diff":500000,"status":"ok"},{"id":"GG17","label":"부천시+고양(덕양구)","region":"경기","members":[{"name":"부천시 원미구","amount":1000000},{"name":"부천시 소사구","amount":500000},{"name":"부천시 오정구","amount":300000},{"name":"고양시 덕양구","amount":2000000,"overlap":true}],"total":3800000,"diff":800000,"status":"ok"},{"id":"GG18","label":"동두천-연천-포천-남양주","region":"경기","members":[{"name":"동두천시","amount":300000},{"name":"연천군","amount":300000},{"name":"포천시","amount":1000000,"overlap":true},{"name":"남양주시","amount":2000000,"overlap":true}],"total":3600000,"diff":600000,"status":"ok"}];
</script>
<script>(function(){
  "use strict";
  const fmt = n => n.toLocaleString('ko-KR') + '원';
  const fmtShort = n => (Math.floor(n/1000000)*100).toLocaleString('ko-KR') + '만원';

  const nameToGroup = {};
  GROUPS.forEach(g => g.members.forEach(m => { nameToGroup[m.name] = g; }));

  const seoulGroups = GROUPS.filter(g => g.region === '서울');
  const gyeonggiGroups = GROUPS.filter(g => g.region === '경기');
  const groupColor = {};
  seoulGroups.forEach((g,i) => {
    const h = 200 + i * (50/seoulGroups.length);
    groupColor[g.id] = d3.hsl(h, 0.55, 0.48).formatHex();
  });
  gyeonggiGroups.forEach((g,i) => {
    const h = 15 + i * (120/gyeonggiGroups.length);
    groupColor[g.id] = d3.hsl(h, 0.52, 0.46).formatHex();
  });

  const svg = d3.select('#map');
  const W=760, H=680, PAD=22;
  const projection = d3.geoMercator().fitExtent([[PAD,PAD],[W-PAD,H-PAD]], GEODATA);
  const pathGen = d3.geoPath().projection(projection);
  const mapG = svg.append('g');
  const ticksLayer = svg.append('g');

  const paths = mapG.selectAll('path.district')
    .data(GEODATA.features)
    .join('path')
    .attr('class','district')
    .attr('d', d => pathGen(d))
    .on('mousemove', onHover)
    .on('mouseleave', onLeave)
    .on('click', (ev,d) => {
      const g = nameToGroup[d.properties.name];
      if(g){ isAllMode=false; updateToggleUI(false); selectGroup(g.id); }
    });

  const bboxRect = ticksLayer.append('rect').attr('class','bbox-rect');
  const tooltip = document.getElementById('tooltip');
  const mapWrap = document.getElementById('mapWrap');

  function onHover(ev,d){
    const nm = d.properties.name;
    const g = nameToGroup[nm];
    const r = mapWrap.getBoundingClientRect();
    tooltip.style.left=(ev.clientX-r.left)+'px';
    tooltip.style.top=(ev.clientY-r.top)+'px';
    const m = g.members.find(x=>x.name===nm);
    tooltip.innerHTML=`<b>${nm}</b><br><span class="ttmeta">${g.id} · ${fmt(m?m.amount:0)}</span>`;
    tooltip.classList.add('show');
  }
  function onLeave(){ tooltip.classList.remove('show'); }

  let activeRegion='all';
  document.querySelectorAll('.rgn-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeRegion=btn.dataset.region;
      document.querySelectorAll('.rgn-btn').forEach(b=>b.classList.toggle('active',b.dataset.region===activeRegion));
      renderGroupList();
      clearHighlight(); isAllMode=false; updateToggleUI(false);
      const first=GROUPS.find(g=>activeRegion==='all'||g.region===activeRegion);
      if(first) selectGroup(first.id);
    });
  });

  const groupListEl=document.getElementById('groupList');
  function renderGroupList(){
    groupListEl.innerHTML='';
    GROUPS.filter(g=>activeRegion==='all'||g.region===activeRegion).forEach(g=>{
      const btn=document.createElement('button');
      btn.className='group-item'; btn.type='button'; btn.dataset.gid=g.id;
      const rgn=g.region==='서울'?'<span class="rtag seoul">서울</span>':'<span class="rtag gyeonggi">경기</span>';
      btn.innerHTML=`<span class="gswatch" style="background:${groupColor[g.id]}"></span>
        <span class="gid">${g.id}</span>
        <span class="glabel">${g.label}${rgn}</span>
        <span class="gmeta"><span class="gamount">${fmtShort(g.total)}</span><span class="gdot ${g.status}"></span></span>`;
      btn.addEventListener('click',()=>{ isAllMode=false; updateToggleUI(false); selectGroup(g.id); });
      groupListEl.appendChild(btn);
    });
  }
  renderGroupList();

  const detailPanel=document.getElementById('detailPanel');
  function renderDetail(g){
    const chips=g.members.map(m=>`<span class="chip ${m.overlap?'overlap':''}">${m.name} <b>${fmtShort(m.amount)}</b>${m.overlap?'<span class="otag">중복</span>':''}</span>`).join('');
    const statusRow=g.status==='ok'
      ?`<div class="row ok"><span>목표(300만) 대비</span><span class="v">달성 ✓</span></div>`
      :`<div class="row short"><span>목표(300만) 대비</span><span class="v">▲${fmtShort(Math.abs(g.diff))} 미달</span></div>`;
    const note=g.status==='short'?`<div class="note">인접 지역 모두 묶어도 300만원 미달 — 앱종료팝업 결합 PKG 검토 권장</div>`:'';
    detailPanel.innerHTML=`
      <div class="dh">
        <span class="id">${g.id}</span>
        <span class="label">${g.label}</span>
        <span class="rtag ${g.region==='서울'?'seoul':'gyeonggi'}">${g.region}</span>
      </div>
      <div class="chips">${chips}</div>
      <div class="totals">
        <div class="row"><span>음성광고비 합계</span><span class="v total">${fmt(g.total)}</span></div>
        ${statusRow}
      </div>${note}`;
  }

  let isAllMode=false, currentGid=null;
  function selectGroup(gid){
    currentGid=gid;
    const g=GROUPS.find(x=>x.id===gid);
    const memberNames=new Set(g.members.map(m=>m.name));
    const color=groupColor[gid];
    paths
      .classed('dim',d=>!memberNames.has(d.properties.name))
      .classed('hl', d=>memberNames.has(d.properties.name))
      .style('fill',  d=>memberNames.has(d.properties.name)?color:null)
      .style('stroke',d=>memberNames.has(d.properties.name)?d3.color(color).brighter(0.7).formatHex():null)
      .style('opacity',null);
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    paths.each(function(d){
      if(memberNames.has(d.properties.name)){
        const b=this.getBBox();
        minX=Math.min(minX,b.x);minY=Math.min(minY,b.y);
        maxX=Math.max(maxX,b.x+b.width);maxY=Math.max(maxY,b.y+b.height);
      }
    });
    const pad=8; minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
    bboxRect.attr('x',minX).attr('y',minY).attr('width',maxX-minX).attr('height',maxY-minY).classed('show',true);
    const len=14;
    const defs=[{cx:minX,cy:minY,dx:1,dy:1},{cx:maxX,cy:minY,dx:-1,dy:1},{cx:minX,cy:maxY,dx:1,dy:-1},{cx:maxX,cy:maxY,dx:-1,dy:-1}];
    ticksLayer.selectAll('path.tick').data(defs).join('path').attr('class','tick show')
      .attr('d',c=>`M ${c.cx} ${c.cy+c.dy*len} L ${c.cx} ${c.cy} L ${c.cx+c.dx*len} ${c.cy}`);
    document.querySelectorAll('.group-item').forEach(el=>el.classList.toggle('active',el.dataset.gid===gid));
    const active=document.querySelector('.group-item.active');
    if(active) active.scrollIntoView({block:'nearest'});
    renderDetail(g);
  }

  function clearHighlight(){
    paths.classed('dim',false).classed('hl',false).style('fill',null).style('stroke',null).style('opacity',null);
    bboxRect.classed('show',false);
    ticksLayer.selectAll('path.tick').classed('show',false);
  }

  const toggleBtn=document.getElementById('toggleAll');
  function updateToggleUI(on){
    isAllMode=on;
    toggleBtn.classList.toggle('active',on);
    toggleBtn.textContent=on?'그룹별 선택':'전체 보기';
  }
  toggleBtn.addEventListener('click',()=>{
    isAllMode=!isAllMode; updateToggleUI(isAllMode);
    if(isAllMode){
      bboxRect.classed('show',false);
      ticksLayer.selectAll('path.tick').classed('show',false);
      paths.classed('dim',false).classed('hl',false)
        .style('fill',d=>groupColor[nameToGroup[d.properties.name].id])
        .style('stroke','#0B161E').style('opacity',0.88);
      document.querySelectorAll('.group-item').forEach(el=>el.classList.remove('active'));
    } else {
      clearHighlight();
      if(currentGid) selectGroup(currentGid);
    }
  });

  selectGroup('GS1');
})();
</script>
